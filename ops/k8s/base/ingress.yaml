apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spot-scam-api
  labels:
    app.kubernetes.io/name: spot-scam-api
    app.kubernetes.io/part-of: spot-scam
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - api.spot-scam.example.com
      secretName: spot-scam-api-tls
  rules:
    - host: api.spot-scam.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spot-scam-api
                port:
                  number: 80

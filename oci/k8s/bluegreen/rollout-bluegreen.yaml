apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: spot-scam-api
  labels:
    app: spot-scam-api
    app.kubernetes.io/name: spot-scam-api
    app.kubernetes.io/part-of: spot-scam
spec:
  replicas: 3
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app: spot-scam-api
  strategy:
    blueGreen:
      activeService: spot-scam-api
      previewService: spot-scam-api-preview
      autoPromotionEnabled: false
      autoPromotionSeconds: 180
      scaleDownDelaySeconds: 180
      prePromotionAnalysis:
        templates:
          - templateName: latency-error-budget
        args:
          - name: service-name
            value: spot-scam-api
      postPromotionAnalysis:
        templates:
          - templateName: latency-error-budget
        args:
          - name: service-name
            value: spot-scam-api
  template:
    metadata:
      labels:
        app: spot-scam-api
        tier: api
    spec:
      serviceAccountName: spot-scam-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/example/spot-scam/api:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: spot-scam-api-config
            - secretRef:
                name: spot-scam-api-secrets
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: artifacts
              mountPath: /app/artifacts
              readOnly: true
            - name: tracking
              mountPath: /app/tracking
            - name: mlruns
              mountPath: /app/mlruns
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: spot-scam-artifacts
        - name: tracking
          persistentVolumeClaim:
            claimName: spot-scam-tracking
        - name: mlruns
          persistentVolumeClaim:
            claimName: spot-scam-mlruns
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: spot-scam-api

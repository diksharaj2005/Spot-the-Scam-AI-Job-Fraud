name: Build & Publish Containers

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write

env:
  CHECKOUT_REF: ${{ secrets.COMMIT_HASH || github.sha }}

jobs:
  model:
    name: "🤖 Train classical model artifacts"
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
      MLFLOW_TRACKING_URI: file:./mlruns
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgomp1

      - name: Install project dependencies
        env:
          PIP_NO_CACHE_DIR: "1"
        run: |
          pip install --upgrade pip setuptools wheel
          pip install "scikit-learn==1.7.2" --upgrade-strategy only-if-needed
          pip install -e '.[dev]'

      - name: Run training pipeline (skip transformer)
        run: python -m spot_scam.pipeline.train --skip-transformer

      - name: Upload training artifacts
        uses: actions/upload-artifact@v4
        with:
          name: training-artifacts
          path: |
            artifacts/**
            experiments/**
            mlruns/**
          if-no-files-found: warn

      - name: Summarize training stage
        run: |
          {
            echo "## Training Summary"
            echo ""
            echo "- Command: \`python -m spot_scam.pipeline.train --skip-transformer\`"
            echo "- Checked out commit: \`${{ env.CHECKOUT_REF }}\`"
            echo "- Uploaded artifact: \`training-artifacts\` (artifacts/, experiments/, mlruns/)"
          } >> "$GITHUB_STEP_SUMMARY"

  build-model:
    name: "🔨 Build Model Image"
    runs-on: ubuntu-latest
    needs: model
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts
          path: .

      - name: Prepare model build context
        run: |
          rm -rf docker/model/artifacts
          mv artifacts docker/model/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build model image (preview)
        uses: docker/build-push-action@v5
        with:
          context: docker/model
          file: docker/model/Dockerfile
          push: false
          load: false
          tags: ghcr.io/${{ github.repository_owner }}/spot-the-scam-model:${{ env.CHECKOUT_REF }}
          cache-from: type=gha,scope=model
          cache-to: type=gha,mode=max,scope=model,compression=zstd
          outputs: type=cacheonly

  build-api:
    name: "🔨 Build API Image"
    runs-on: ubuntu-latest
    needs: model
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (preview)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          tags: ghcr.io/${{ github.repository_owner }}/spot-the-scam-api:${{ env.CHECKOUT_REF }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api,compression=zstd
          outputs: type=cacheonly

  build-frontend:
    name: "🔨 Build Frontend Image"
    runs-on: ubuntu-latest
    needs: model
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image (preview)
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: false
          load: false
          tags: ghcr.io/${{ github.repository_owner }}/spot-the-scam-frontend:${{ env.CHECKOUT_REF }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend,compression=zstd
          outputs: type=cacheonly

  push-model:
    name: "🐳 Push Model Image"
    runs-on: ubuntu-latest
    needs: build-model
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Download training artifacts
        uses: actions/download-artifact@v4
        with:
          name: training-artifacts
          path: .

      - name: Prepare model build context
        run: |
          rm -rf docker/model/artifacts
          mv artifacts docker/model/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push model image
        id: model_push
        uses: docker/build-push-action@v5
        with:
          context: docker/model
          file: docker/model/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spot-the-scam-model:${{ env.CHECKOUT_REF }}
            ghcr.io/${{ github.repository_owner }}/spot-the-scam-model:latest
          cache-from: type=gha,scope=model
          cache-to: type=gha,mode=max,scope=model

      - name: Summarize model image
        run: |
          {
            echo "## Model Image Pushed"
            echo "- Digest: \`${{ steps.model_push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  push-api:
    name: "🐳 Push API Image"
    runs-on: ubuntu-latest
    needs: build-api
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push API image
        id: api_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spot-the-scam-api:${{ env.CHECKOUT_REF }}
            ghcr.io/${{ github.repository_owner }}/spot-the-scam-api:latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Summarize API image
        run: |
          {
            echo "## API Image Pushed"
            echo "- Digest: \`${{ steps.api_push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  push-frontend:
    name: "🐳 Push Frontend Image"
    runs-on: ubuntu-latest
    needs: build-frontend
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.CHECKOUT_REF }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push frontend image
        id: frontend_push
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/spot-the-scam-frontend:${{ env.CHECKOUT_REF }}
            ghcr.io/${{ github.repository_owner }}/spot-the-scam-frontend:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Summarize frontend image
        run: |
          {
            echo "## Frontend Image Pushed"
            echo "- Digest: \`${{ steps.frontend_push.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
